# Nginx 反向代理 — V1.3
# ----------------------------------------------------------------------------
# /        → Next.js (quant-ui-node:3000)
# /api/*   → FastAPI (quant-api-node:8080)
# /ws/*    → FastAPI (带 Upgrade 头)
# ----------------------------------------------------------------------------

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 上游
    upstream api_backend {
        server quant-api-node:8080;
    }
    upstream ui_backend {
        server quant-ui-node:3000;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 16M;

        # ── Next.js 前端 + 静态资源 ──
        location / {
            proxy_pass http://ui_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API 反代 ──
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # pipeline 端点(/api/v1/pipeline/run) 跑全量 ETL ~5min
            # 其他 /api/v1/* 路由 90s 足够
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── 根级 FastAPI 端点（/health /docs /openapi.json） ──
        # V1.3 main.py 同时注册 /health 和 /api/health,LB / k8s 探针用前者
        location ~ ^/(health|docs|openapi\.json)$ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket 反代（/ws/alerts 等） ──
        location /ws/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # 简单健康端点
        location /upstream {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
